# Netlify Configuration for DC Pass Portal

[build]
  publish = "dist"
  command = "npm run build"

# Handling Client-side Navigation routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "same-origin"
